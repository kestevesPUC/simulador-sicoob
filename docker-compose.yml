services:
  postgres:
    image: postgres:16-alpine
    container_name: sicoob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sicoobdb
      POSTGRES_USER: sicoob
      POSTGRES_PASSWORD: sicoob
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicoob -d sicoobdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sicoob-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://sicoob:sicoob@postgres:5432/sicoobdb
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sicoob-predial
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

